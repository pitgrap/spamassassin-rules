name: Extract GPG Public Key

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-public-key:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: copilot/add-gpg-key-and-signatures

      - name: Import GPG key and export public key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | base64 --decode | gpg --batch --import
          FINGERPRINT=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          echo "Fingerprint: ${FINGERPRINT}"
          gpg --armor --export "${FINGERPRINT}" > GPG.KEY
          echo "Exported public key:"
          cat GPG.KEY

      - name: Commit updated GPG.KEY
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GPG.KEY
          if git diff --cached --quiet; then
            echo "No changes to GPG.KEY"
          else
            git commit -m "chore: update GPG.KEY to match GPG_PRIVATE_KEY secret"
            git push origin copilot/add-gpg-key-and-signatures
          fi
