name: Publish SpamAssassin Channel

on:
  push:
    branches:
      - main
    paths:
      - 'rules/**'
      - 'GPG.KEY'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install SpamAssassin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y spamassassin

      - name: Lint SpamAssassin rules
        run: |
          spamassassin --lint -C rules/ 2>&1
          echo "Lint passed successfully."

      - name: Determine channel version
        id: version
        run: |
          VERSION=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Channel version: ${VERSION}"

      - name: Create rules archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar -czf "${VERSION}.tar.gz" -C rules .
          echo "Created ${VERSION}.tar.gz"

      - name: Generate SHA256 checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sha256sum "${VERSION}.tar.gz" > "${VERSION}.tar.gz.sha256"
          echo "SHA256: $(cat "${VERSION}.tar.gz.sha256")"

      - name: Generate SHA512 checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sha512sum "${VERSION}.tar.gz" > "${VERSION}.tar.gz.sha512"
          echo "SHA512: $(cat "${VERSION}.tar.gz.sha512")"

      - name: Import GPG key and sign archive
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "${GPG_PRIVATE_KEY}" | base64 --decode > /tmp/private.key
          gpg --batch --import /tmp/private.key || { echo "ERROR: GPG key import failed"; exit 1; }
          rm -f /tmp/private.key
          gpg --batch --yes --armor --detach-sign "${VERSION}.tar.gz"
          echo "Signed ${VERSION}.tar.gz -> ${VERSION}.tar.gz.asc"

      - name: Create VERSION file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "${VERSION}" > VERSION
          echo "VERSION file contains: ${VERSION}"

      - name: Prepare GitHub Pages output
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p gh-pages
          cp "${VERSION}.tar.gz"        gh-pages/
          cp "${VERSION}.tar.gz.sha256" gh-pages/
          cp "${VERSION}.tar.gz.sha512" gh-pages/
          cp "${VERSION}.tar.gz.asc"    gh-pages/
          cp VERSION                    gh-pages/
          cp GPG.KEY                    gh-pages/
          # Create a simple index page
          cat > gh-pages/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>SpamAssassin Custom Rules Channel</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
              code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; }
              pre  { background: #f4f4f4; padding: 1em; border-radius: 5px; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>SpamAssassin Custom Rules Channel</h1>
            <p>Current version: <strong>${VERSION}</strong></p>
            <h2>Subscribe via sa-update</h2>
            <pre><code>curl -o /etc/mail/spamassassin/pitgrap.key https://pitgrap.github.io/spamassassin-rules/GPG.KEY
sa-update --channel pitgrap.github.io/spamassassin-rules --gpgkeyfile /etc/mail/spamassassin/pitgrap.key</code></pre>
            <p>Or add to <code>/etc/spamassassin/channel.d/pitgrap.conf</code>:</p>
            <pre><code>channel pitgrap.github.io/spamassassin-rules</code></pre>
            <h2>GPG Verification</h2>
            <p>The rules archive is signed with GPG. To verify manually:</p>
            <pre><code>gpg --import GPG.KEY
          gpg --verify ${VERSION}.tar.gz.asc ${VERSION}.tar.gz</code></pre>
            <h2>Files</h2>
            <ul>
              <li><a href="${VERSION}.tar.gz">${VERSION}.tar.gz</a></li>
              <li><a href="${VERSION}.tar.gz.sha256">${VERSION}.tar.gz.sha256</a></li>
              <li><a href="${VERSION}.tar.gz.sha512">${VERSION}.tar.gz.sha512</a></li>
              <li><a href="${VERSION}.tar.gz.asc">${VERSION}.tar.gz.asc</a></li>
              <li><a href="GPG.KEY">GPG.KEY</a></li>
              <li><a href="VERSION">VERSION</a></li>
            </ul>
            <h2>Source</h2>
            <p><a href="https://github.com/pitgrap/spamassassin-rules">github.com/pitgrap/spamassassin-rules</a></p>
          </body>
          </html>
          EOF
          echo "GitHub Pages output prepared."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          commit_message: "chore: publish rules v${{ steps.version.outputs.version }}"
