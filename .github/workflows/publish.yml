name: Publish SpamAssassin Channel

on:
  push:
    branches:
      - main
    paths:
      - 'rules/**'
      - 'GPG.KEY'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install SpamAssassin
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y spamassassin

      - name: Lint SpamAssassin rules
        run: |
          spamassassin --lint -C rules/ 2>&1
          echo "Lint passed successfully."

      - name: Determine channel version
        id: version
        run: |
          VERSION=$(git rev-list --count HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Channel version: ${VERSION}"

      - name: Create rules archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          tar -czf "${VERSION}.tar.gz" -C rules .
          echo "Created ${VERSION}.tar.gz"

      - name: Generate SHA256 checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sha256sum "${VERSION}.tar.gz" > "${VERSION}.tar.gz.sha256"
          echo "SHA256: $(cat "${VERSION}.tar.gz.sha256")"

      - name: Generate SHA512 checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sha512sum "${VERSION}.tar.gz" > "${VERSION}.tar.gz.sha512"
          echo "SHA512: $(cat "${VERSION}.tar.gz.sha512")"

      - name: Import GPG key and sign archive
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "${GPG_PRIVATE_KEY}" | base64 --decode > /tmp/private.key
          gpg --batch --import /tmp/private.key || { echo "ERROR: GPG key import failed"; exit 1; }
          rm -f /tmp/private.key
          gpg --batch --yes --armor --detach-sign "${VERSION}.tar.gz"
          echo "Signed ${VERSION}.tar.gz -> ${VERSION}.tar.gz.asc"

      - name: Create VERSION file
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "${VERSION}" > VERSION
          echo "VERSION file contains: ${VERSION}"

      - name: Prepare GitHub Pages output
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DATE=$(date -u +"%Y-%m-%d")
          mkdir -p gh-pages
          cp "${VERSION}.tar.gz"        gh-pages/
          cp "${VERSION}.tar.gz.sha256" gh-pages/
          cp "${VERSION}.tar.gz.sha512" gh-pages/
          cp "${VERSION}.tar.gz.asc"    gh-pages/
          cp VERSION                    gh-pages/
          cp GPG.KEY                    gh-pages/
          VERSION="${VERSION}" DATE="${DATE}" envsubst < .github/templates/index.html > gh-pages/index.html
          echo "GitHub Pages output prepared."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          commit_message: "chore: publish rules v${{ steps.version.outputs.version }}"

      - name: Verify channel update via sa-update
        run: |
          echo "Waiting for GitHub Pages to propagate..."
          sleep 30
          curl --retry 5 --retry-delay 15 --retry-all-errors -fsSL \
            https://pitgrap.github.io/spamassassin-rules/GPG.KEY \
            -o /tmp/pitgrap.key
          sudo sa-update \
            --channel pitgrap.github.io/spamassassin-rules \
            --gpgkeyfile /tmp/pitgrap.key \
            --verbose
          RC=$?
          if [ "${RC}" -eq 0 ] || [ "${RC}" -eq 1 ]; then
            echo "Channel check passed (rc=${RC})."
          else
            echo "Channel check FAILED (rc=${RC})." >&2
            exit "${RC}"
          fi
